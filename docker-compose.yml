version: '3.8'

services:

  site-principal:
    image: gvenzl/oracle-xe:21-slim
    container_name: site_principal
    environment:
      ORACLE_PASSWORD: oracle123
      ORACLE_DATABASE: PRINCIPAL
    ports:
      - "1524:1521"
    volumes:
      - site_principal_data:/opt/oracle/oradata
    networks:
      eshop-net:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10

  site1:
    image: gvenzl/oracle-xe:21-slim
    container_name: site1
    environment:
      ORACLE_PASSWORD: oracle123
      ORACLE_DATABASE: SITE1DB
    ports:
      - "1522:1521"
    volumes:
      - site1_data:/opt/oracle/oradata
    networks:
      eshop-net:
        ipv4_address: 172.20.0.11
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10

  site2:
    image: gvenzl/oracle-xe:21-slim
    container_name: site2
    environment:
      ORACLE_PASSWORD: oracle123
      ORACLE_DATABASE: SITE2DB
    ports:
      - "1523:1521"
    volumes:
      - site2_data:/opt/oracle/oradata
    networks:
      eshop-net:
        ipv4_address: 172.20.0.12
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10

volumes:
  site_principal_data:
  site1_data:
  site2_data:

networks:
  eshop-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
